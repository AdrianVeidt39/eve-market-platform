version: '3.9'

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eve_market
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/eve_market
      HOST: 0.0.0.0
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run migrate -w apps/api && npm run dev:api"

volumes:
  mysql_data:
